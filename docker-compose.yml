services:
  app:
    build: .
    container_name: async-api
    ports:
      - "8001:8000"
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: async-api-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"
